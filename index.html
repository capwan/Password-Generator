<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="icon" type="image/png" sizes="32x32" href="./assets/icons/favicon.png" />
        <link rel="apple-touch-icon" sizes="180x180" href="./assets/icons/apple-touch-icon.png" />
        <link rel="stylesheet" href="./style.css" />
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
        <title>Password Generator</title>
    </head>
    <body>
        <div class="container">
            <h2>Password Generator</h2>
            <div class="wrapper">
                <div class="input-box">
                    <input type="text" readonly aria-label="Generated password">
                    <span class="material-symbols-rounded copy-icon" role="button" tabindex="0" aria-label="Copy password">copy_all</span>
                </div>
                <div class="pass-indicator"></div>
                <div class="pass-length">
                    <div class="details">
                        <label class="title">Password Length</label>
                        <span class="length-value">8</span>
                    </div>
                    <input type="range" min="8" max="64" value="8" step="1">
                </div>
                <div class="pass-settings">
                    <label class="title">Password Settings</label>
                    <ul class="options">
                        <li class="option">
                            <input type="checkbox" id="lowercase">
                            <label for="lowercase">Lowercase (a-z)</label>
                        </li>
                        <li class="option">
                            <input type="checkbox" id="uppercase">
                            <label for="uppercase">Uppercase (A-Z)</label>
                        </li>
                        <li class="option">
                            <input type="checkbox" id="numbers">
                            <label for="numbers">Numbers (0-9)</label>
                        </li>
                        <li class="option">
                            <input type="checkbox" id="symbols">
                            <label for="symbols">Symbols (~!@#^-)</label>
                        </li>
                        <li class="option">
                            <input type="checkbox" id="exc-duplicate">
                            <label for="exc-duplicate">Exclude duplicate</label>
                        </li>
                        <li class="option">
                            <input type="checkbox" id="spaces">
                            <label for="spaces">Include spaces</label>
                        </li>
                    </ul>
                </div>
                <button class="generate-btn">Generate Password</button>
            </div>
        </div>
        <script src="./script.js"></script>
    </body>
</html>
